<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DhamanPay | Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dp-dark': '#0b1f3a',
            'dp-blue': '#1d4ed8',
            'dp-blue-deep': '#173b8f',
            'dp-panel': '#f2efe6',
            'dp-gold': '#D4AF37',
            'dp-gold-light': '#F7E7A1',
            'dp-gold-dark': '#6E4B0D'
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            display: ['Oswald', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: #0b1f3a;
      color: white;
      overflow-x: hidden;
    }

    .gold-metallic-text {
      background: linear-gradient(90deg,#6E4B0D,#F7E7A1,#D4AF37);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .gold-button {
      background: linear-gradient(90deg,#6E4B0D,#F7E7A1,#D4AF37);
      color: #0b1f3a;
      transition: 0.3s;
    }

    .gold-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212,175,55,0.4);
    }

    .logo-box {
      border-radius: 2rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 40px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hero-bg {
      background: linear-gradient(
        135deg,
        #0b1f3a 0%,
        #1e1b4b 40%,
        #0b1f3a 100%
      );
    }

    .loader {
      position: fixed;
      inset: 0;
      background: #0b1f3a;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: transform 0.8s ease-in-out;
    }

    .loader-bar-bg {
      width: 220px;
      height: 2px;
      background: rgba(255, 255, 255, 0.12);
      margin-top: 18px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #6E4B0D 0%, #F7E7A1 50%, #D4AF37 100%);
      position: absolute;
      left: 0;
      top: 0;
    }
  </style>
</head>

<body>

  <!-- Loader Curtain -->
  <div class="loader" id="loader">
    <div class="text-white font-display text-3xl tracking-[0.25em] uppercase">
      Dhaman<span class="gold-metallic-text">Pay</span>
    </div>
    <div class="loader-bar-bg">
      <div class="loader-bar" id="loader-bar"></div>
    </div>
  </div>

  <header class="fixed top-0 left-0 w-full z-40 py-5 px-8 flex justify-between items-center">
    <h1 class="text-2xl font-display tracking-widest">
      Dhaman<span class="gold-metallic-text">Pay</span>
    </h1>

    <div class="flex gap-4 items-center">
      <a href="login.html" class="text-white/80 hover:text-white transition">Login</a>
      <a href="loginn.html" class="gold-button px-4 py-2 rounded-xl text-sm font-bold">Register</a>
    </div>
  </header>

  <section class="min-h-screen flex items-center hero-bg pt-20">
    <div class="w-full max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-[1.1fr_0.9fr] gap-10 items-center">

      <div class="hero-reveal flex justify-center lg:justify-start">
        <div class="logo-box max-w-xl w-full">
          <h1 class="text-6xl md:text-7xl font-display tracking-widest">
            Dhaman<span class="gold-metallic-text">Pay</span>
          </h1>

          <p class="mt-6 text-white/70 text-lg leading-relaxed">
            Secure your transactions. Protect your money.
            Buy and sell online with more confidence.
          </p>
        </div>
      </div>

      <div class="hero-reveal flex justify-center lg:justify-end">
        <div class="bg-[#f2efe6] text-[#0b1f3a] rounded-3xl p-10 max-w-md w-full shadow-2xl">

          <h2 class="text-3xl font-display mb-6">
            Start Using DhamanPay
          </h2>

          <p class="text-gray-600 mb-8 leading-relaxed">
            Join a secure platform that protects both buyers and sellers during every transaction.
          </p>

          <div class="flex flex-col gap-4">
            <a href="login.html"
               class="gold-button py-4 rounded-xl text-center uppercase text-sm font-bold">
              Login
            </a>

            <a href="loginn.html"
               class="border border-gray-300 py-4 rounded-xl text-center uppercase text-sm font-bold hover:bg-gray-100 transition">
              Create Account
            </a>
          </div>

        </div>
      </div>

    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      gsap.set('.hero-reveal', { y: 80, opacity: 0 });

      gsap.to('#loader-bar', {
        width: '100%',
        duration: 1.2,
        ease: 'power2.inOut',
        onComplete: function () {
          gsap.to('#loader', {
            yPercent: -100,
            duration: 0.8,
            ease: 'power4.inOut'
          });

          gsap.to('.hero-reveal', {
            y: 0,
            opacity: 1,
            duration: 1,
            stagger: 0.15,
            ease: 'power3.out',
            delay: 0.1
          });
        }
      });
    });
  </script>

</body>
</html>
